# docker-compose.override.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Set required environment variables:
#   export FASTAPI_SESSION_SECRET=<strong-random-key>
#   export TOKEN_ENCRYPTION_KEY=<fernet-key>
#   export LOGS_READ_AUTH_TOKEN=<strong-random-token>
#   export CONFIG_WRITE_AUTH_TOKEN=<strong-random-token>
#   export FASTAPI_CORS_ORIGINS=https://<public-app-host>
#   export VITE_API_BASE_URL=https://<public-app-host>/api
#   export CADDY_APP_SITE_HOSTS=<public-app-host>[,www.<public-app-host>]
#   export CADDY_CROSS_SITE_HOST=<optional-secondary-host>
#   export CADDY_CROSS_UPSTREAM=<host-or-service>:<port>
#   export TRUST_PROXY=true  # only when API access is restricted to trusted proxy traffic

version: "3.9"

services:
  # ── API — Production ─────────────────────────────────────────────────────────
  api:
    restart: on-failure
    environment:
      - FASTAPI_ENV=production
      - FASTAPI_SESSION_SECRET=${FASTAPI_SESSION_SECRET:?FASTAPI_SESSION_SECRET is required in production}
      - LOGS_READ_AUTH_TOKEN=${LOGS_READ_AUTH_TOKEN:?LOGS_READ_AUTH_TOKEN is required}
      - CONFIG_WRITE_AUTH_TOKEN=${CONFIG_WRITE_AUTH_TOKEN:?CONFIG_WRITE_AUTH_TOKEN is required}
      - FASTAPI_CORS_ORIGINS=${FASTAPI_CORS_ORIGINS:?FASTAPI_CORS_ORIGINS is required in production}
      - ENABLE_CSRF=${ENABLE_CSRF:-true}
      - FASTAPI_SESSION_COOKIE_SECURE=${FASTAPI_SESSION_COOKIE_SECURE:-true}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - CONTENT_SECURITY_POLICY
    volumes:
      - ai-data:/app/data:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend — Production (static build) ─────────────────────────────────────
  frontend:
    restart: on-failure
    command: sh -c "npm install -g serve && serve -s /app/dist/public -l 5173 --no-clipboard"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:?VITE_API_BASE_URL is required in production}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Caddy — Production ───────────────────────────────────────────────────────
  caddy:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
