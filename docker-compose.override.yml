# docker-compose.override.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Set required environment variables:
#   export FASTAPI_SESSION_SECRET=<strong-random-key>
#   export TOKEN_ENCRYPTION_KEY=<fernet-key>
#   export LOGS_READ_AUTH_TOKEN=<strong-random-token>
#   export CONFIG_WRITE_AUTH_TOKEN=<strong-random-token>
#   export CADDY_DOMAIN=aiinforsearch.com

version: "3.9"

services:
  # ── API — Production ─────────────────────────────────────────────────────────
  api:
    restart: on-failure
    environment:
      - FASTAPI_ENV=production
      - FASTAPI_SESSION_SECRET=${FASTAPI_SESSION_SECRET:?FASTAPI_SESSION_SECRET is required in production}
      - LOGS_READ_AUTH_TOKEN=${LOGS_READ_AUTH_TOKEN:?LOGS_READ_AUTH_TOKEN is required}
      - CONFIG_WRITE_AUTH_TOKEN=${CONFIG_WRITE_AUTH_TOKEN:?CONFIG_WRITE_AUTH_TOKEN is required}
      - FASTAPI_CORS_ORIGINS=https://${CADDY_DOMAIN:?CADDY_DOMAIN required}
    volumes:
      - ai-data:/app/data:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend — Production (static build) ─────────────────────────────────────
  frontend:
    restart: on-failure
    command: sh -c "npm install -g serve && serve -s /app/dist/public -l 5173 --no-clipboard"
    environment:
      - VITE_API_BASE_URL=https://${CADDY_DOMAIN:?CADDY_DOMAIN required}/api
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Caddy — Production ───────────────────────────────────────────────────────
  caddy:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
