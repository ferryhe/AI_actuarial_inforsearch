[pytest]
# Test discovery patterns
testpaths = .
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=ai_actuarial
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --cov-fail-under=0

# Coverage options
[coverage:run]
source = ai_actuarial
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */virtualenv/*
    .venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
