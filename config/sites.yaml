scheduled_tasks: []
ai_config:
  catalog:
    provider: openai
    model: gpt-5.4-mini
    temperature: 0.7
    timeout_seconds: 60
    credential_id: openai:llm:instance:default
  embeddings:
    provider: openai
    model: text-embedding-3-large
    batch_size: 64
    similarity_threshold: 0.4
    cache_enabled: true
    credential_id: openai:llm:instance:default
  chatbot:
    provider: openai
    model: gpt-5.4-mini
    temperature: 0.7
    max_tokens: 1000
    streaming_enabled: true
    max_context_messages: 10
    default_mode: expert
    enable_citation: true
    min_citation_score: 0.4
    max_citations_per_response: 5
    enable_query_validation: true
    enable_response_validation: true
    max_query_length: 1000
    credential_id: openai:llm:instance:default
  ocr:
    provider: mistral
    model: mistral-ocr-latest
    mistral:
      max_pdf_tokens: 9000
      max_pages_per_chunk: 10
      timeout_seconds: 60
      retry_attempts: 3
      extract_header: true
      extract_footer: true
    siliconflow:
      max_input_tokens: 3500
      chunk_overlap_tokens: 200
      timeout_seconds: 60
      retry_attempts: 3
    credential_id: mistral:llm:instance:default
rag_config:
  chunk_strategy: semantic_structure
  max_chunk_tokens: 800
  min_chunk_tokens: 100
  preserve_headers: true
  preserve_citations: true
  include_hierarchy: true
  index_type: Flat
features:
  enable_file_deletion: true
  require_auth: false
  enable_csrf: false
  enable_security_headers: true
  expose_error_details: false
  enable_global_logs_api: false
  enable_rate_limiting: false
  rate_limit_defaults: 200 per hour, 50 per minute
  rate_limit_storage_uri: memory://
  content_security_policy: ''
server:
  host: 0.0.0.0
  port: 5000
  max_content_length: 52428800
  fastapi_env: production
  fastapi_debug: false
