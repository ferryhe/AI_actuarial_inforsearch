name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-gitee-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'ferryhe/AI_actuarial_inforsearch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Gitee SSH credentials
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          GITEE_KNOWN_HOSTS: ${{ secrets.GITEE_KNOWN_HOSTS }}
        run: |
          if [ -z "$GITEE_SSH_PRIVATE_KEY" ]; then
            echo "GITEE_SSH_PRIVATE_KEY is required." >&2
            exit 1
          fi

          if [ -z "$GITEE_KNOWN_HOSTS" ]; then
            echo "GITEE_KNOWN_HOSTS is required." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/gitee_sync
          chmod 600 ~/.ssh/gitee_sync
          printf '%s\n' "$GITEE_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host gitee.com
            HostName gitee.com
            User git
            IdentityFile ~/.ssh/gitee_sync
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Push main and tags to Gitee
        env:
          GITEE_REMOTE: git@gitee.com:jghe/AI_actuarial_inforsearch.git
        run: |
          git remote add gitee "$GITEE_REMOTE"
          git push gitee HEAD:main
          git push gitee --tags
