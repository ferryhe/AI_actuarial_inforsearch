{% extends "base.html" %}

{% block title %}File Preview{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/file_preview.css') }}">
{% endblock %}

{% block content %}
<div class="file-preview-container">
    <div class="preview-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 id="file-title" style="margin: 0;" data-i18n="fp.title">File Preview</h2>
                <p id="file-info" style="margin: 0.5rem 0 0 0; color: var(--text-secondary);"></p>
            </div>
            <div>
                <a href="{{ url_for('database') }}" class="btn btn-secondary" data-i18n="fp.back">Back to Database</a>
            </div>
        </div>
    </div>
    
    <div class="preview-content">
        <!-- Left pane: Original file -->
        <div class="preview-pane" id="original-pane">
            <h3 class="pane-title" data-i18n="fp.original">Original File</h3>
            <div id="original-viewer-container">
                <div class="loading-spinner" data-i18n="fp.loading_orig">Loading original file...</div>
            </div>
        </div>
        
        <!-- Right pane: Chunks -->
        <div class="preview-pane" id="chunks-pane">
            <h3 class="pane-title" data-i18n="fp.chunks">Chunks</h3>
            <div id="chunk-set-controls" style="margin-bottom: 1rem;"></div>
            <div id="chunks-list">
                <div class="loading-spinner" data-i18n="fp.loading_chunks">Loading chunks...</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- PDF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script>
    // Runtime configuration for PDF.js (primary CDN + fallback CDN).
    window.__PDFJS_PRIMARY_SRC = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    window.__PDFJS_PRIMARY_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    window.__PDFJS_FALLBACK_SRC = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js';
    window.__PDFJS_FALLBACK_WORKER = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = window.__PDFJS_PRIMARY_WORKER;
    }
</script>

<!-- File preview script -->
<script src="{{ url_for('static', filename='js/file_preview.js') }}"></script>

<script>
    // Initialize preview with URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const fileUrl = urlParams.get('file_url');
    const kbId = urlParams.get('kb_id');
    const chunkSetId = urlParams.get('chunk_set_id');
    
    if (fileUrl) {
        window.FilePreview.init(fileUrl, kbId, chunkSetId);
    } else {
        const errNoFile = window.I18n ? window.I18n.t('fp.error_no_file') : 'Error: No file specified';
        const errNoUrl  = window.I18n ? window.I18n.t('fp.no_url')        : 'No file URL provided';
        document.getElementById('file-title').textContent = errNoFile;
        document.getElementById('original-viewer-container').innerHTML = `<p>${errNoUrl}</p>`;
        document.getElementById('chunk-set-controls').innerHTML = '';
        document.getElementById('chunks-list').innerHTML = `<p>${errNoUrl}</p>`;
    }
</script>
{% endblock %}
