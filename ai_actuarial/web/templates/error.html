{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="page-header">
    <h2 data-i18n="error.heading">Error</h2>
</div>

<div class="card" style="padding: 2rem; text-align: center;">
    <svg style="width: 64px; height: 64px; margin: 0 auto 1rem; color: var(--error-color);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    
    <h3 style="margin-bottom: 1rem; color: var(--error-color);">{{ error or 'An error occurred' }}</h3>
    
    {% if detail %}
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">{{ detail }}</p>
    {% endif %}
    
    <a href="{{ url_for('index') }}" class="btn btn-primary" data-i18n="error.return_dashboard">Return to Dashboard</a>
</div>
{% endblock %}
