<div id="rag-file-selector-modal" class="modal" style="display:none;" data-static-modal="true">
    <div class="modal-content modal-lg rag-file-selector-modal-content">
        <span class="close" data-close-modal="rag-file-selector-modal">&times;</span>
        <h3 data-i18n="file_sel.title">Select Files</h3>
        <p class="rag-selector-hint" data-i18n="file_sel.hint">Only files with markdown content are shown.</p>
        <div class="rag-selector-toolbar">
            <input type="text" id="rag-file-selector-search" placeholder="Search filename or title">
            <select id="rag-file-selector-category">
                <option value="" data-i18n="file_sel.all_cats">All Categories</option>
            </select>
            <button type="button" id="rag-file-selector-refresh" class="btn btn-secondary btn-small" data-i18n="file_sel.refresh">Refresh</button>
        </div>
        <div class="rag-selector-table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="rag-file-selector-check-all"></th>
                        <th data-i18n="file_sel.col_name">Filename</th>
                        <th data-i18n="file_sel.col_cat">Category</th>
                        <th data-i18n="file_sel.col_source">Source</th>
                        <th data-i18n="file_sel.col_size">Size</th>
                        <th data-i18n="file_sel.col_upd">Updated</th>
                    </tr>
                </thead>
                <tbody id="rag-file-selector-body">
                    <tr><td colspan="6" data-i18n="file_sel.loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="rag-selector-footer">
            <div id="rag-file-selector-summary">0 files selected</div>
            <div class="rag-selector-footer-actions">
                <button type="button" id="rag-file-selector-prev" class="btn btn-secondary btn-small" data-i18n="file_sel.prev">Prev</button>
                <button type="button" id="rag-file-selector-next" class="btn btn-secondary btn-small" data-i18n="file_sel.next">Next</button>
                <button type="button" id="rag-file-selector-clear" class="btn btn-secondary btn-small" data-i18n="file_sel.clear">Clear</button>
                <button type="button" id="rag-file-selector-apply" class="btn btn-primary btn-small" data-i18n="file_sel.apply">Apply</button>
            </div>
        </div>
    </div>
</div>
