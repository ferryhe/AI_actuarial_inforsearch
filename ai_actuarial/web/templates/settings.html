{% extends "base.html" %}

{% block content %}
<div class="settings-page">
    <div class="page-header">
        <h2>Backend Settings</h2>
    </div>

    <div class="tabs">
        <button class="tab-link active" onclick="openTab(event, 'tab-categories')">Categories</button>
        <button class="tab-link" onclick="openTab(event, 'tab-backend')">Other Settings</button>
    </div>

    <div id="tab-categories" class="tab-content" style="display:block;">
        <div class="settings-grid">
            <section class="card">
                <h3>Category List</h3>
                <div class="row">
                    <input id="new-category-name" type="text" placeholder="New category name">
                    <button class="btn btn-secondary" onclick="addCategory()">Add</button>
                </div>
                <select id="category-list" size="16" onchange="onCategorySelect()"></select>
                <button class="btn btn-danger" onclick="removeCategory()">Delete Selected</button>
            </section>

            <section class="card">
                <h3>Category Details</h3>
                <label for="category-name">Category Name</label>
                <input id="category-name" type="text" readonly>
                <label for="category-keywords">Keywords (one per line)</label>
                <textarea id="category-keywords" rows="13" placeholder="artificial intelligence&#10;machine learning"></textarea>
                <button class="btn btn-primary" onclick="saveCategoryKeywords()">Apply to Selected Category</button>
            </section>
        </div>

        <div class="card">
            <h3>AI Keyword Settings</h3>
            <div class="dual-grid">
                <div>
                    <label for="ai-filter-keywords">ai_filter_keywords</label>
                    <textarea id="ai-filter-keywords" rows="10"></textarea>
                </div>
                <div>
                    <label for="ai-keywords">ai_keywords</label>
                    <textarea id="ai-keywords" rows="10"></textarea>
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveCategoriesConfig()">Save Categories Config</button>
        </div>
    </div>

    <div id="tab-backend" class="tab-content">
        <div class="card">
            <h3>Crawler Defaults (sites.yaml)</h3>
            <div class="form-grid">
                <div>
                    <label for="defaults-user-agent">User Agent</label>
                    <input id="defaults-user-agent" type="text">
                </div>
                <div>
                    <label for="defaults-max-pages">Max Pages</label>
                    <input id="defaults-max-pages" type="number" min="1">
                </div>
                <div>
                    <label for="defaults-max-depth">Max Depth</label>
                    <input id="defaults-max-depth" type="number" min="1">
                </div>
                <div>
                    <label for="defaults-delay">Delay Seconds</label>
                    <input id="defaults-delay" type="number" step="0.1" min="0">
                </div>
                <div>
                    <label for="defaults-file-exts">File Extensions (one per line)</label>
                    <textarea id="defaults-file-exts" rows="6"></textarea>
                </div>
                <div>
                    <label for="defaults-keywords">Keywords (one per line)</label>
                    <textarea id="defaults-keywords" rows="6"></textarea>
                </div>
                <div>
                    <label for="defaults-exclude-keywords">Exclude Keywords (one per line)</label>
                    <textarea id="defaults-exclude-keywords" rows="6"></textarea>
                </div>
                <div>
                    <label for="defaults-exclude-prefixes">Exclude Prefixes (one per line)</label>
                    <textarea id="defaults-exclude-prefixes" rows="6"></textarea>
                </div>
                <div>
                    <label for="defaults-schedule-interval">Schedule Interval</label>
                    <input id="defaults-schedule-interval" type="text" placeholder="daily / every 6 hours / daily at 01:00">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Paths (sites.yaml)</h3>
            <div class="form-grid">
                <div>
                    <label for="paths-db">DB Path</label>
                    <input id="paths-db" type="text">
                </div>
                <div>
                    <label for="paths-download-dir">Download Directory</label>
                    <input id="paths-download-dir" type="text">
                </div>
                <div>
                    <label for="paths-updates-dir">Updates Directory</label>
                    <input id="paths-updates-dir" type="text">
                </div>
                <div>
                    <label for="paths-last-run-new">Last Run File</label>
                    <input id="paths-last-run-new" type="text">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Search Settings (sites.yaml)</h3>
            <div class="form-grid">
                <div>
                    <label for="search-enabled">Enabled</label>
                    <input id="search-enabled" type="checkbox">
                </div>
                <div>
                    <label for="search-max-results">Max Results</label>
                    <input id="search-max-results" type="number" min="1">
                </div>
                <div>
                    <label for="search-delay">Delay Seconds</label>
                    <input id="search-delay" type="number" step="0.1" min="0">
                </div>
                <div>
                    <label for="search-country">Country</label>
                    <input id="search-country" type="text">
                </div>
                <div>
                    <label for="search-languages">Languages (one per line)</label>
                    <textarea id="search-languages" rows="4"></textarea>
                </div>
                <div>
                    <label for="search-exclude-keywords">Exclude Keywords (one per line)</label>
                    <textarea id="search-exclude-keywords" rows="4"></textarea>
                </div>
                <div>
                    <label for="search-queries">Queries (one per line)</label>
                    <textarea id="search-queries" rows="6"></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Runtime Flags (read-only)</h3>
            <div id="runtime-flags" class="runtime-flags"></div>
            <button class="btn btn-primary" onclick="saveBackendSettings()">Save Backend Settings</button>
        </div>
    </div>
</div>

<script>
let categoriesConfig = {
    categories: {},
    ai_filter_keywords: [],
    ai_keywords: [],
};
let selectedCategory = '';

function openTab(evt, tabId) {
    document.querySelectorAll('.tab-content').forEach((tab) => {
        tab.style.display = 'none';
    });
    document.querySelectorAll('.tab-link').forEach((btn) => {
        btn.classList.remove('active');
    });
    document.getElementById(tabId).style.display = 'block';
    evt.currentTarget.classList.add('active');
}

function notifySuccess(message) {
    if (window.Toast && typeof window.Toast.success === 'function') {
        window.Toast.success(message);
    } else {
        alert(message);
    }
}

function notifyError(message) {
    if (window.Toast && typeof window.Toast.error === 'function') {
        window.Toast.error(message);
    } else {
        alert(message);
    }
}

function textToList(text) {
    return text
        .split('\n')
        .map((v) => v.trim())
        .filter(Boolean);
}

function listToText(items) {
    return (items || []).join('\n');
}

function renderCategoryList() {
    const listEl = document.getElementById('category-list');
    listEl.innerHTML = '';
    Object.keys(categoriesConfig.categories)
        .sort((a, b) => a.localeCompare(b))
        .forEach((name) => {
            const option = new Option(name, name);
            if (name === selectedCategory) option.selected = true;
            listEl.appendChild(option);
        });
    onCategorySelect();
}

function onCategorySelect() {
    const listEl = document.getElementById('category-list');
    if (listEl.value) {
        selectedCategory = listEl.value;
    } else if (!Object.prototype.hasOwnProperty.call(categoriesConfig.categories, selectedCategory)) {
        selectedCategory = '';
    }

    document.getElementById('category-name').value = selectedCategory;
    document.getElementById('category-keywords').value = selectedCategory
        ? listToText(categoriesConfig.categories[selectedCategory] || [])
        : '';
}

function addCategory() {
    const input = document.getElementById('new-category-name');
    const name = input.value.trim();
    if (!name) {
        notifyError('Category name is required');
        return;
    }
    if (Object.prototype.hasOwnProperty.call(categoriesConfig.categories, name)) {
        notifyError('Category already exists');
        return;
    }
    categoriesConfig.categories[name] = [];
    selectedCategory = name;
    input.value = '';
    renderCategoryList();
}

function removeCategory() {
    if (!selectedCategory) {
        notifyError('Select one category first');
        return;
    }
    delete categoriesConfig.categories[selectedCategory];
    selectedCategory = '';
    renderCategoryList();
}

function saveCategoryKeywords() {
    if (!selectedCategory) {
        notifyError('Select one category first');
        return;
    }
    const keywords = textToList(document.getElementById('category-keywords').value);
    categoriesConfig.categories[selectedCategory] = keywords;
    notifySuccess('Selected category updated in memory');
}

async function loadCategoriesConfig() {
    const response = await fetch('/api/config/categories');
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Failed to load categories config');

    categoriesConfig = {
        categories: data.categories || {},
        ai_filter_keywords: data.ai_filter_keywords || [],
        ai_keywords: data.ai_keywords || [],
    };
    selectedCategory = Object.keys(categoriesConfig.categories)[0] || '';
    document.getElementById('ai-filter-keywords').value = listToText(categoriesConfig.ai_filter_keywords);
    document.getElementById('ai-keywords').value = listToText(categoriesConfig.ai_keywords);
    renderCategoryList();
}

async function saveCategoriesConfig() {
    categoriesConfig.ai_filter_keywords = textToList(document.getElementById('ai-filter-keywords').value);
    categoriesConfig.ai_keywords = textToList(document.getElementById('ai-keywords').value);
    const response = await fetch('/api/config/categories', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(categoriesConfig),
    });
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.error || 'Failed to save categories config');
    }
    notifySuccess('categories.yaml updated');
}

async function loadBackendSettings() {
    const response = await fetch('/api/config/backend-settings');
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Failed to load backend settings');

    document.getElementById('defaults-user-agent').value = data.defaults.user_agent || '';
    document.getElementById('defaults-max-pages').value = data.defaults.max_pages || '';
    document.getElementById('defaults-max-depth').value = data.defaults.max_depth || '';
    document.getElementById('defaults-delay').value = data.defaults.delay_seconds || '';
    document.getElementById('defaults-file-exts').value = listToText(data.defaults.file_exts || []);
    document.getElementById('defaults-keywords').value = listToText(data.defaults.keywords || []);
    document.getElementById('defaults-exclude-keywords').value = listToText(data.defaults.exclude_keywords || []);
    document.getElementById('defaults-exclude-prefixes').value = listToText(data.defaults.exclude_prefixes || []);
    document.getElementById('defaults-schedule-interval').value = data.defaults.schedule_interval || '';

    document.getElementById('paths-db').value = data.paths.db || '';
    document.getElementById('paths-download-dir').value = data.paths.download_dir || '';
    document.getElementById('paths-updates-dir').value = data.paths.updates_dir || '';
    document.getElementById('paths-last-run-new').value = data.paths.last_run_new || '';

    document.getElementById('search-enabled').checked = !!data.search.enabled;
    document.getElementById('search-max-results').value = data.search.max_results || '';
    document.getElementById('search-delay').value = data.search.delay_seconds || '';
    document.getElementById('search-country').value = data.search.country || '';
    document.getElementById('search-languages').value = listToText(data.search.languages || []);
    document.getElementById('search-exclude-keywords').value = listToText(data.search.exclude_keywords || []);
    document.getElementById('search-queries').value = listToText(data.search.queries || []);

    const runtimeEl = document.getElementById('runtime-flags');
    runtimeEl.innerHTML = `
        <div><strong>CONFIG_PATH:</strong> ${data.runtime.config_path}</div>
        <div><strong>CATEGORIES_CONFIG_PATH:</strong> ${data.runtime.categories_config_path}</div>
        <div><strong>ENABLE_FILE_DELETION:</strong> ${data.runtime.file_deletion_enabled}</div>
        <div><strong>FILE_DELETION_AUTH_TOKEN set:</strong> ${data.runtime.file_deletion_auth_required}</div>
    `;
}

async function saveBackendSettings() {
    const payload = {
        defaults: {
            user_agent: document.getElementById('defaults-user-agent').value.trim(),
            max_pages: Number(document.getElementById('defaults-max-pages').value),
            max_depth: Number(document.getElementById('defaults-max-depth').value),
            delay_seconds: Number(document.getElementById('defaults-delay').value),
            file_exts: textToList(document.getElementById('defaults-file-exts').value),
            keywords: textToList(document.getElementById('defaults-keywords').value),
            exclude_keywords: textToList(document.getElementById('defaults-exclude-keywords').value),
            exclude_prefixes: textToList(document.getElementById('defaults-exclude-prefixes').value),
            schedule_interval: document.getElementById('defaults-schedule-interval').value.trim(),
        },
        paths: {
            db: document.getElementById('paths-db').value.trim(),
            download_dir: document.getElementById('paths-download-dir').value.trim(),
            updates_dir: document.getElementById('paths-updates-dir').value.trim(),
            last_run_new: document.getElementById('paths-last-run-new').value.trim(),
        },
        search: {
            enabled: document.getElementById('search-enabled').checked,
            max_results: Number(document.getElementById('search-max-results').value),
            delay_seconds: Number(document.getElementById('search-delay').value),
            country: document.getElementById('search-country').value.trim(),
            languages: textToList(document.getElementById('search-languages').value),
            exclude_keywords: textToList(document.getElementById('search-exclude-keywords').value),
            queries: textToList(document.getElementById('search-queries').value),
        },
    };

    const response = await fetch('/api/config/backend-settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
    });
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.error || 'Failed to save backend settings');
    }
    notifySuccess('sites.yaml backend settings updated');
    await loadBackendSettings();
}

async function initPage() {
    try {
        await Promise.all([loadCategoriesConfig(), loadBackendSettings()]);
    } catch (err) {
        notifyError(err.message);
        console.error(err);
    }
}

initPage();
</script>

<style>
.tabs {
    overflow: hidden;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 20px;
}

.tab-link {
    background-color: inherit;
    border: none;
    outline: none;
    cursor: pointer;
    padding: 14px 16px;
    transition: 0.3s;
    font-size: 16px;
    border-bottom: 3px solid transparent;
    color: var(--text-secondary);
}

.tab-link.active {
    border-bottom: 3px solid var(--primary-color);
    font-weight: bold;
    color: var(--text-primary);
}

.tab-content {
    display: none;
    padding: 20px 0;
}

.settings-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 16px;
    margin-bottom: 16px;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}

.row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.row input {
    flex: 1;
}

.card select,
.card input,
.card textarea {
    width: 100%;
    margin: 6px 0 12px;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--text-primary);
    font-family: inherit;
}

.dual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.runtime-flags {
    display: grid;
    gap: 6px;
    margin-bottom: 12px;
}

@media (max-width: 900px) {
    .settings-grid,
    .dual-grid,
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}
