{% extends "base.html" %}

{% block content %}
<div class="collection-page">
    <div class="page-header">
        <h2 data-i18n="col_url.title">🔗 URL Collection</h2>
        <p data-i18n="col_url.subtitle">Download files from specific URLs</p>
    </div>

    <div class="collection-form">
        <div class="form-group">
            <label for="urls" data-i18n="col_url.urls_label">URLs (one per line):</label>
            <textarea id="urls" rows="10" placeholder="https://example.com/document.pdf&#10;https://example.com/report.docx"></textarea>
        </div>
        <div class="form-group">
            <label for="collection-name" data-i18n="col_url.name_label">Collection Name:</label>
            <input type="text" id="collection-name" value="URL Collection" />
        </div>
        <div class="form-group checkbox">
            <label>
                <input type="checkbox" id="check-database" checked />
                <span data-i18n="col_url.check_dup">Check for duplicates in database</span>
            </label>
        </div>
        <div class="form-actions">
            <button onclick="startCollection()" class="btn btn-primary" data-i18n="col_url.start">Start Collection</button>
            <button onclick="history.back()" class="btn btn-secondary" data-i18n="col_url.cancel">Cancel</button>
        </div>
    </div>

    <div id="progress-container" style="display: none;">
        <h3 data-i18n="col_url.progress">Collection Progress</h3>
        <div class="progress-panel">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="progress-details"></div>
        </div>
    </div>
</div>

<script>
function startCollection() {
    const urlsText = document.getElementById('urls').value;
    const urls = urlsText.split('\n').map(u => u.trim()).filter(u => u);
    
    if (urls.length === 0) {
        alert(window.I18n ? window.I18n.t('col_url.alert_no_url') : 'Please enter at least one URL');
        return;
    }

    const payload = {
        type: 'url',
        urls: urls,
        name: document.getElementById('collection-name').value,
        check_database: document.getElementById('check-database').checked
    };

    document.getElementById('progress-container').style.display = 'block';

    fetch('/api/collections/run', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const found = window.I18n ? window.I18n.t('col_url.alert_found') : 'Found:';
            const dl    = window.I18n ? window.I18n.t('col_url.alert_dl')    : 'Downloaded:';
            const done  = window.I18n ? window.I18n.t('col_url.completed')   : 'Collection completed!';
            alert(`${done}\n${found} ${data.items_found}\n${dl} ${data.items_downloaded}`);
            window.location = '/database';
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    })
    .catch(error => {
        console.error('Error starting collection:', error);
        alert('Error: ' + error.message);
    });
}
</script>
{% endblock %}
