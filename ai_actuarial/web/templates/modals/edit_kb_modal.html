<div id="rag-edit-kb-modal" class="modal" style="display:none;" data-static-modal="true">
    <div class="modal-content rag-task-modal">
        <span class="close" data-close-modal="rag-edit-kb-modal">&times;</span>
        <h3>Edit Knowledge Base</h3>
        <form id="rag-edit-kb-form">
            <input type="hidden" name="kb_id">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>KB Mode</label>
                <input type="text" name="kb_mode" readonly>
            </div>
            <div class="form-group">
                <label>Embedding Model</label>
                <input type="text" name="embedding_model" readonly>
            </div>
            <p class="hint">kb_id, mode, and embedding model are immutable for existing KBs.</p>
            <div class="rag-modal-actions">
                <button type="button" class="btn btn-secondary" data-close-modal="rag-edit-kb-modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
