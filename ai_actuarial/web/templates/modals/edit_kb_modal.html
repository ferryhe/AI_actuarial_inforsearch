<div id="rag-edit-kb-modal" class="modal" style="display:none;" data-static-modal="true">
    <div class="modal-content modal-md">
        <span class="close" data-close-modal="rag-edit-kb-modal">&times;</span>
        <h3 data-i18n="kb_edit.title">Edit Knowledge Base</h3>
        <form id="rag-edit-kb-form">
            <input type="hidden" name="kb_id">
            <div class="form-group">
                <label data-i18n="kb_edit.name">Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label data-i18n="kb_edit.desc">Description</label>
                <textarea name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label data-i18n="kb_edit.mode">KB Mode</label>
                <input type="text" name="kb_mode" readonly>
            </div>
            <div class="form-group">
                <label data-i18n="kb_edit.embedding">Embedding Model</label>
                <input type="text" name="embedding_model" readonly>
            </div>
            <p class="hint" data-i18n="kb_edit.immutable">kb_id, mode, and embedding model are immutable for existing KBs.</p>
            <div class="rag-modal-actions">
                <button type="button" class="btn btn-secondary" data-close-modal="rag-edit-kb-modal" data-i18n="kb_edit.cancel">Cancel</button>
                <button type="submit" class="btn btn-primary" data-i18n="kb_edit.save">Save</button>
            </div>
        </form>
    </div>
</div>
