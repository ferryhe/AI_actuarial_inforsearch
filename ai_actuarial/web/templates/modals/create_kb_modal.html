<div id="rag-create-kb-modal" class="modal" style="display:none;" data-static-modal="true">
    <div class="modal-content modal-lg">
        <span class="close" data-close-modal="rag-create-kb-modal">&times;</span>
        <h3 data-i18n="kb_create.title">Create Knowledge Base</h3>
        <form id="rag-create-kb-form">
            <div class="form-row">
                <div class="form-group half">
                    <label data-i18n="kb_create.kb_id">KB ID (Auto Generated)</label>
                    <div id="rag-create-kb-id-preview" class="rag-generated-kb-id">KB_YYYYMMDD_0001</div>
                    <input type="hidden" name="kb_id" id="rag-create-kb-id-input">
                </div>
                <div class="form-group half">
                    <label data-i18n="kb_create.name">Name</label>
                    <input type="text" name="name" required placeholder="Pricing & Risk KB">
                </div>
            </div>
            <div class="form-group">
                <label data-i18n="kb_create.desc">Description</label>
                <textarea name="description" rows="2" placeholder="Optional description"></textarea>
            </div>
            <div class="form-group">
                <label data-i18n="kb_create.mode">Mode</label>
                <div class="rag-mode-toggle">
                    <label><input type="radio" name="kb_mode" value="category" checked> <span data-i18n="kb_create.cat_mode">Category Mode</span></label>
                    <label><input type="radio" name="kb_mode" value="manual"> <span data-i18n="kb_create.manual_mode">Manual Mode</span></label>
                </div>
            </div>

            <div id="rag-create-category-fields">
                <div class="form-group">
                    <label data-i18n="kb_create.categories">Categories</label>
                    <select name="categories" id="rag-create-categories" multiple size="8"></select>
                    <small data-i18n="kb_create.cats_hint">Hold Ctrl/Cmd to select multiple categories.</small>
                </div>
                <div id="rag-create-category-stats" class="rag-category-stats text-muted" data-i18n="kb_create.cats_stats">
                    Select categories to view unique file and markdown counts.
                </div>
            </div>

            <div id="rag-create-manual-fields" style="display:none;">
                <div class="form-group">
                    <label data-i18n="kb_create.sel_files">Selected Files</label>
                    <div class="rag-selected-files-header">
                        <span id="rag-create-selected-files-count">0 <span data-i18n="kb_create.n_selected">files selected</span></span>
                        <button type="button" id="rag-open-file-selector" class="btn btn-secondary btn-small" data-i18n="kb_create.sel_btn">Select Files</button>
                    </div>
                    <div id="rag-create-selected-files" class="rag-selected-files-list"></div>
                </div>
            </div>

            <details class="rag-advanced-settings">
                <summary data-i18n="kb_create.advanced">Advanced Settings</summary>
                <div class="form-group">
                    <label data-i18n="kb_create.chunk_prof">Chunk Profile</label>
                    <select name="chunk_profile_id" id="rag-create-chunk-profile" required>
                        <option value="" selected disabled data-i18n="kb_create.chunk_ph">Select existing chunk profile</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label data-i18n="kb_create.embed_model">Embedding Model</label>
                        <select name="embedding_model">
                            <option value="text-embedding-3-large">text-embedding-3-large</option>
                            <option value="text-embedding-3-small">text-embedding-3-small</option>
                        </select>
                        <small class="form-hint" data-i18n="kb_create.embed_hint">Index model (for vector embedding), independent of chunk profile model.</small>
                    </div>
                </div>
                <div id="rag-create-selected-profile-summary" class="rag-category-stats text-muted" style="display:none;"></div>
            </details>

            <div class="rag-modal-actions">
                <button type="button" class="btn btn-secondary" data-close-modal="rag-create-kb-modal" data-i18n="kb_create.cancel">Cancel</button>
                <button type="submit" class="btn btn-primary" data-i18n="kb_create.create">Create</button>
                <button type="button" id="rag-create-and-index-btn" class="btn btn-primary" data-i18n="kb_create.create_idx">Create & Index</button>
            </div>
        </form>
    </div>
</div>
